name: Vercel Preview Check

on:
  issue_comment:
    types: [created, edited]

jobs:
  preview-check:
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'vercel[bot]' &&
      contains(github.event.comment.body, 'vercel.app') &&
      contains(github.event.comment.body, 'Ready')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1.0.70
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "vercel[bot]"
          prompt: |
            Vercel has posted or updated a deployment-ready comment on PR #${{ github.event.issue.number }}.

            The Vercel bot comment body is:
            ${{ github.event.comment.body }}

            Your job is to post a NEW comment with preview links and a verification assessment — but only if the PR has new commits since you last commented. Follow these steps exactly:

            1. Get the PR's current HEAD commit SHA:
               ```
               gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid --jq '.headRefOid'
               ```
               Call this CURRENT_SHA.

            2. Check whether you have already posted a preview-check comment for this exact commit. Search all comments on the PR for one whose body contains the HTML marker `<!-- vercel-preview-check: CURRENT_SHA -->` (replace CURRENT_SHA with the actual SHA):
               ```
               gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
                 --jq '[.[] | select(.body | contains("<!-- vercel-preview-check: CURRENT_SHA -->"))] | length'
               ```
               If the result is 1 or more, stop immediately — you have already commented for this commit.

            3. Extract the Vercel preview base URL from the Vercel bot comment body above. It will be a link labelled "Preview" pointing to a *.vercel.app host. Use only the scheme+host (e.g. `https://webula-abc123.vercel.app`) — discard any path.

            4. Get the PR diff to understand which files changed:
               ```
               gh pr diff ${{ github.event.issue.number }} --repo ${{ github.repository }} --name-only
               ```

            5. Get the PR body to extract the "## Visual Verification" section if it exists:
               ```
               gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body --jq '.body'
               ```

            6. Review the changed files and the codebase routing to identify which app routes will surface the changes.

               Note: appending `?fixture=1` preloads a hardcoded demo deck so a reviewer does not need their own saved account or saved deck. It is supported on `/decks` and `/decks/practice`.

            7. Construct full clickable URLs by appending each relevant path to the Vercel preview base URL from step 3.

               Example: if the base URL is `https://webula-abc123.vercel.app` and the route is `/decks?fixture=1`,
               the full URL is `https://webula-abc123.vercel.app/decks?fixture=1`.

            8. Assess whether the Visual Verification section in the PR body adequately covers the relevant paths:
               - Did the author mention visiting all relevant routes? The hostname does not need to match because the author tested locally — only the paths matter.
               - Do their described actions match what the changed code actually affects?
               - For deck-related routes, did they use or mention `?fixture=1`?

            9. Post a NEW comment on the PR using:
               ```
               gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "..."
               ```

               Format the comment as follows (use real URLs, not placeholders). The HTML marker at the top is required — replace CURRENT_SHA with the actual SHA from step 1:

               ```
               <!-- vercel-preview-check: CURRENT_SHA -->
               ## Preview Links

               Changed files affect these routes:

               - [/decks?fixture=1](https://webula-abc123.vercel.app/decks?fixture=1) — deck builder (fixture deck preloaded)
               - [/](https://webula-abc123.vercel.app/) — card search

               ## Verification Assessment

               ✅ PR description includes a Visual Verification section covering /decks and /.
               ⚠️ The verification does not mention fixture=1 — consider testing with a preloaded deck.
               ```

               Use 👀 when the verification section mentions all relevant paths.
               Use ⚠️ for partial coverage or missing fixture=1 (where deck loading is relevant).
               Use 🟠 for correct URLs visited, but actions recorded would have been insufficient to verify the feature.
               Use ❌ when no verification section is found or the coverage is clearly inadequate.

               If the changed files are infrastructure-only (e.g. only workflow files changed), still post a comment noting that no app routes are affected and therefore no preview links are relevant, and assess the verification section accordingly.
          claude_args: "--max-turns 30 --dangerously-skip-permissions"
          show_full_output: "true"
